<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Video to Sprite Sheets Generator</title>
    <style>
      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background: #121212;
        color: #eee;
        max-width: 800px;
        margin: 40px auto;
        padding: 20px;
        line-height: 1.6;
      }
      .container {
        background: #1e1e1e;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 8px 30px rgba(0, 0, 0, 0.5);
      }
      h1 {
        color: #00d2ff;
      }
      .upload-area {
        border: 2px dashed #444;
        padding: 40px;
        text-align: center;
        border-radius: 8px;
        cursor: pointer;
        transition: 0.3s;
      }
      .upload-area:hover {
        border-color: #00d2ff;
        background: #252525;
      }
      video {
        max-width: 100%;
        margin-top: 20px;
        display: none;
        border-radius: 8px;
      }
      .controls {
        margin-top: 20px;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
      }
      .input-group {
        display: flex;
        flex-direction: column;
      }
      label {
        margin-bottom: 5px;
        font-size: 0.9em;
        color: #aaa;
      }
      input {
        padding: 10px;
        background: #333;
        border: 1px solid #444;
        color: white;
        border-radius: 4px;
      }
      button {
        margin-top: 30px;
        padding: 15px;
        background: linear-gradient(135deg, #00d2ff 0%, #3a7bd5 100%);
        border: none;
        color: white;
        font-weight: bold;
        border-radius: 6px;
        cursor: pointer;
        font-size: 1.1em;
        width: 100%;
      }
      button:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      #canvas {
        display: none;
      }
      #output {
        margin-top: 30px;
        text-align: center;
      }
      #output img {
        max-width: 100%;
        border: 1px solid #444;
        border-radius: 8px;
      }
      .download-link {
        display: inline-block;
        margin-top: 15px;
        color: #00d2ff;
        text-decoration: none;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>Sprite Animation Generator</h1>
      <p>動画を読み込んで、CSSアニメーション用の「スプライトシート」を生成します。</p>

      <div class="upload-area" id="drop-zone">
        ファイルをここにドラッグ＆ドロップ、またはクリックして選択
        <input type="file" id="file-input" hidden accept="video/*" />
      </div>

      <video id="video-source" controls></video>

      <div class="controls">
        <div class="input-group">
          <label>フレーム数 (コマ数)</label>
          <input type="number" id="frame-count" value="24" />
        </div>
        <div class="input-group">
          <label>スプライトの幅 (1コマあたり)</label>
          <input type="number" id="tile-width" value="200" />
        </div>
      </div>

      <button id="generate-btn">スプライトシートを生成</button>

      <canvas id="canvas"></canvas>

      <div id="output">
        <h3>生成結果</h3>
        <div id="result-container"></div>
      </div>
    </div>

    <script>
      const dropZone = document.getElementById('drop-zone');
      const fileInput = document.getElementById('file-input');
      const video = document.getElementById('video-source');
      const generateBtn = document.getElementById('generate-btn');
      const canvas = document.getElementById('canvas');
      const resultContainer = document.getElementById('result-container');

      dropZone.onclick = () => fileInput.click();

      fileInput.onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
          const url = URL.createObjectURL(file);
          video.src = url;
          video.style.display = 'block';
          dropZone.textContent = file.name + ' を読み込みました';
        }
      };

      generateBtn.onclick = async () => {
        if (!video.duration) return alert('動画を選択してください');

        const frameCount = parseInt(document.getElementById('frame-count').value);
        const tileWidth = parseInt(document.getElementById('tile-width').value);
        const aspectRatio = video.videoHeight / video.videoWidth;
        const tileHeight = Math.round(tileWidth * aspectRatio);

        // スプライトシート全体のサイズ (横一列に並べる)
        canvas.width = tileWidth * frameCount;
        canvas.height = tileHeight;
        const ctx = canvas.getContext('2d');

        resultContainer.innerHTML = '生成中...';

        for (let i = 0; i < frameCount; i++) {
          const time = (video.duration / frameCount) * i;
          video.currentTime = time;

          await new Promise((resolve) => {
            video.onseeked = resolve;
          });

          ctx.drawImage(video, i * tileWidth, 0, tileWidth, tileHeight);
        }

        const spriteUrl = canvas.toDataURL('image/webp', 0.8);
        resultContainer.innerHTML = `
                <img src="${spriteUrl}">
                <br>
                <a href="${spriteUrl}" download="loading-sprite.webp" class="download-link">画像をダウンロード</a>
                <p style="font-size: 0.8em; color: #888;">設定: ${frameCount}コマ / サイズ: ${canvas.width}x${canvas.height}</p>
            `;
      };
    </script>
  </body>
</html>
