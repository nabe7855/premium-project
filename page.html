所、ご利用コース、セラピストの指名有無をお伝え頂ければご案内をお取りします。HPを参考にお問い合わせ下さいませ♫\",\"question\":\"初めての利用で何を伝えれば良いか分かりません....\"},{\"id\":\"7\",\"answer\":\"もちろん可能です。その際、混雑の状況にもよりますがメール、LINEよりも直接お電話頂いた方がご案内がスムーズです♫\",\"question\":\"当日予約はできますか?\"},{\"id\":\"8\",\"answer\":\"基本的に当日受付は23時で終了致しますので、深夜帯にご利用の場合は予め早い段階でのご連絡をお願い致します。かつ深夜帯の待機セラピストは少数ですのでお早めにご連絡を頂いた方がご案内がスムーズです♫\",\"question\":\"深夜に利用はできますか?\"},{\"id\":\"9\",\"answer\":\"基本的には長くとも2週間前程でお願いしております。例外として出張、ご旅行などで日程が予め決まっている場合は受付をしておりますのでお気軽にお問い合わせ下さい♫\",\"question\":\"予約は何日先まで可能ですか?\"},{\"id\":\"10\",\"answer\":\"基本的にセラピストは電車での移動となりますので駅でのお待ち合わせとなります。その際何処か改札口、お店の前、ホテルなど目印をご指定頂けると幸いです♫\",\"question\":\"待ち合わせはどうすれば良いですか?\"},{\"id\":\"11\",\"answer\":\"最寄りの駅でのお待ち合わせをして、そのままご自宅へ移動という事もできますので、受付にご相談下さい♫\",\"question\":\"自宅利用したいが住所は教えたくない\"},{\"id\":\"12\",\"answer\":\"ご利用のお部屋はお客様で決めて頂き、先に入室されていても大丈夫です。もしお決まりでなければセラピストにお任せする事もできますのでお気軽にお伝え下さい♫\",\"question\":\"ホテルはどうすれば良いですか?\"},{\"id\":\"13\",\"answer\":\"年齢、タイプなどお伝え頂ければ受付の方でご希望に近いセラピストさんを選定致しますのでお気軽にお伝え下さい♫\",\"question\":\"セラピストが多くて選べない\"},{\"id\":\"14\",\"answer\":\"偽名で大丈夫です、セラピストにもお客様の個人情報は基本的にお伝えはしませんのでご安心ください♫\",\"question\":\"本名を伝えたくありません\"},{\"id\":\"15\",\"answer\":\"施術コースのお時間のカウントはお部屋に入室後、カウンセリング、シャワーを浴びた後になりますので、お時間一杯ごゆっくりお過ごしください♫\",\"question\":\"時間のカウントは会ってからですか?\"}],\"isVisible\":true,\"headingImageUrl\":\"https://vkrztvkpjcpejccyiviw.supabase.co/storage/v1/object/public/banners/store-top/fukuoka/faq_1775725848583.webp\"},\"quickAccess\":{\"isVisible\":true,\"items\":[{\"en\":\"THERAPIST\",\"ja\":\"セラピスト一覧\",\"href\":\"https://www.sutoroberrys.jp/store/{slug}/cast-list\",\"icon\":\"Users\"},{\"en\":\"TODAY\",\"ja\":\"当日出勤\",\"href\":\"#cast\",\"icon\":\"CalendarCheck\"},{\"en\":\"EVENT\",\"ja\":\"イベント\",\"href\":\"#campaign\",\"icon\":\"Sparkles\"},{\"en\":\"DIARY\",\"ja\":\"写メ日記\",\"href\":\"#diary\",\"icon\":\"Camera\"},{\"en\":\"REVIEW\",\"ja\":\"口コミ\",\"href\":\"https://www.sutoroberrys.jp/store/{slug}/reviews/reviews\",\"icon\":\"MessageCircle\"},{\"en\":\"Q\u0026A\",\"ja
